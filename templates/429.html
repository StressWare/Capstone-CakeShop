<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>429 – Too Many Requests | Mrs. Brave's</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #d63384;
      --pink-dark: #a0205e;
      --pink-light: #fde8f1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: #1a0a12;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; }
    .blob-1 { width: 400px; height: 400px; background: var(--pink); top: -100px; right: -100px; animation: drift 8s ease-in-out infinite alternate; }
    .blob-2 { width: 300px; height: 300px; background: #ff6bb5; bottom: -80px; left: -80px; animation: drift 10s ease-in-out infinite alternate-reverse; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    .floaties { position: absolute; inset: 0; pointer-events: none; }
    .floaty { position: absolute; font-size: 1.5rem; opacity: 0.12; animation: floatUp linear infinite; }
    .floaty:nth-child(1) { left: 8%;  animation-duration: 12s; animation-delay: 0s; }
    .floaty:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; font-size: 2rem; }
    .floaty:nth-child(3) { left: 50%; animation-duration: 10s; animation-delay: 4s; }
    .floaty:nth-child(4) { left: 70%; animation-duration: 14s; animation-delay: 1s; font-size: 1.1rem; }
    .floaty:nth-child(5) { left: 88%; animation-duration: 11s; animation-delay: 3s; font-size: 1.8rem; }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(214,51,132,0.25);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 56px 52px;
      text-align: center;
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(214,51,132,0.12), 0 24px 80px rgba(0,0,0,0.4);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .snail-icon {
      font-size: 3.5rem; margin-bottom: 8px; display: block;
      animation: slowWiggle 2.5s ease-in-out infinite;
    }
    @keyframes slowWiggle {
      0%,100% { transform: translateX(0) rotate(0deg); }
      25%      { transform: translateX(-6px) rotate(-5deg); }
      75%      { transform: translateX(6px) rotate(5deg); }
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 7rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--pink) 0%, #ff8dc7 50%, var(--pink-dark) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px; letter-spacing: -4px;
    }

    .divider { width: 60px; height: 3px; background: linear-gradient(90deg, var(--pink), var(--pink-dark)); border-radius: 2px; margin: 16px auto; }

    h2 { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.6rem; margin-bottom: 12px; }
    p  { color: rgba(255,255,255,0.55); font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; }

    /* Countdown ring */
    .countdown-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px;
    }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: rgba(214,51,132,0.15); stroke-width: 5; }
    .ring-progress {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 700;
      color: #fff;
      margin-top: -68px; /* overlap the SVG */
      position: relative; z-index: 1;
      line-height: 1;
    }
    .countdown-label {
      font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-top: 4px;
    }

    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: #fff; text-decoration: none;
      padding: 14px 28px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.95rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(214,51,132,0.4);
      border: none; cursor: pointer;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(214,51,132,0.55); color: #fff; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(214,51,132,0.4);
      box-shadow: none; color: rgba(255,255,255,0.7);
    }
    .btn-ghost:hover { background: rgba(214,51,132,0.1); border-color: var(--pink); color: #fff; box-shadow: none; }

    .brand { margin-top: 32px; color: rgba(255,255,255,0.2); font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; }

    @media (max-width: 575px) {
      .card { padding: 32px 20px; width: 88%; }
      .error-code { font-size: 4.5rem; letter-spacing: -2px; }
      h2 { font-size: 1.2rem; }
      p  { font-size: 0.85rem; }
      .snail-icon { font-size: 2.5rem; }
      .btn { padding: 11px 18px; font-size: 0.85rem; }
      .btn-group { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="floaties">
    <span class="floaty">🎂</span>
    <span class="floaty">🍰</span>
    <span class="floaty">🎂</span>
    <span class="floaty">🍰</span>
    <span class="floaty">🎂</span>
  </div>

  <div class="card">
    <span class="snail-icon">🐌</span>
    <div class="error-code">429</div>
    <div class="divider"></div>
    <h2>Patience, the Cake is Still Baking!</h2>
    <p>
      You've been browsing a little too fast.
      {% if description %}Limit reached: <strong style="color:var(--pink)">{{ description }}</strong>.{% endif %}
      Take a breather — you can try again shortly.
    </p>

    <!-- Countdown -->
    <div class="countdown-wrap">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#d63384"/>
            <stop offset="100%" stop-color="#ff8dc7"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="40" cy="40" r="34"/>
        <circle class="ring-progress" id="ringProgress" cx="40" cy="40" r="34"/>
      </svg>
      <div class="countdown-number" id="countdownNum">--</div>
      <div class="countdown-label">seconds</div>
    </div>

    <div class="btn-group">
      <button id="retryBtn" class="btn" disabled onclick="window.location.reload()">⏳ Please Wait…</button>
      <a href="/" class="btn btn-ghost">← Back to Home</a>
    </div>
    <div class="brand">Mrs. Brave's Cake Shop</div>
  </div>

  <script>
    // Flask passes retry_after (seconds) into the template
    const retryAfter = parseInt("{{ retry_after | default(60) }}", 10) || 60;

    const numEl    = document.getElementById('countdownNum');
    const ringEl   = document.getElementById('ringProgress');
    const retryBtn = document.getElementById('retryBtn');

    const radius = 34;
    const circ   = 2 * Math.PI * radius;
    ringEl.style.strokeDasharray  = circ;
    ringEl.style.strokeDashoffset = 0;

    let remaining = retryAfter;

    function tick() {
      numEl.textContent = remaining;
      // progress from full ring → empty as time runs out
      const progress = remaining / retryAfter;
      ringEl.style.strokeDashoffset = circ * (1 - progress);

      if (remaining <= 0) {
        numEl.textContent = '0';
        retryBtn.disabled = false;
        retryBtn.textContent = '✓ Try Again';
        return;
      }
      remaining--;
      setTimeout(tick, 1000);
    }

    tick();
  </script>
</body>
</html>
