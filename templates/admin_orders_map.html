<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Map — Ms. Brave Cake Shop</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f9f0f5; }

    .header {
      background: linear-gradient(135deg, #d63384, #a0205e);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 1rem; font-weight: 700; }
    .header p  { font-size: 0.78rem; opacity: 0.85; margin-top: 2px; }

    #map { 
      height: calc(100vh - 110px); 
      width: 100%; 
    }

    .legend {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      background: white;
      font-size: 0.78rem;
      border-bottom: 1px solid #fce8f3;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }
    .dot-shop     { background: #d63384; }
    .dot-customer { background: #0d6efd; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Delivery Location</h1>
    <p>{{ order.customer.name }} — {{ order.customer.address }}</p>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-shop"></div> Ms. Brave Cake Shop</div>
  <div class="legend-item"><div class="legend-dot dot-customer"></div> {{ order.customer.name }}</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const SHOP     = { lat: 10.711925117255893, lng: 122.53996450415457 };
  const CUSTOMER = { 
    lat: {{ order.customer.lat }}, 
    lng: {{ order.customer.lng }} 
  };

  var map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  var shopIcon = L.divIcon({
    html: '<div style="background:#d63384; width:14px; height:14px; border-radius:50%; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7], className: ''
  });
  var customerIcon = L.divIcon({
    html: '<div style="background:#0d6efd; width:18px; height:18px; border-radius:50%; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
    iconSize: [18, 18], iconAnchor: [9, 9], className: ''
  });

  L.marker([SHOP.lat, SHOP.lng], { icon: shopIcon })
    .addTo(map)
    .bindPopup('<strong>Ms. Brave Cake Shop</strong><br>R Mapa St, Mandurriao');

  L.marker([CUSTOMER.lat, CUSTOMER.lng], { icon: customerIcon })
    .addTo(map)
    .bindPopup('<strong>{{ order.customer.name }}</strong><br>{{ order.customer.address }}')
    .openPopup();

  map.fitBounds([
    [SHOP.lat, SHOP.lng],
    [CUSTOMER.lat, CUSTOMER.lng]
  ], { padding: [60, 60], maxZoom: 15 });
</script>
</body>
</html>
