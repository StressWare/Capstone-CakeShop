<body>

    <!-- NAVBAR -->
    <nav class="navbar fixed-top" style="min-height:80px; height:auto; overflow:visible; padding:10px; background-color:#000000;">
  <div class="container-fluid">
    <a href="#">
      <img src="/static/img/mrs.brave.jpg" 
           alt="MRS. Brave's" 
           style="height:160px; width:auto; object-fit:contain; display:block; margin-top: 18px;">
    </a>
  </div>
</nav>

    <!-- Spacer for navbar -->
    <div style="height: 70px;"></div>

    <!-- FORM CONTAINER -->
    <div class="container">
        <div style="height: 70px;"></div>
        
        <div class="container auth-layout">
            <!-- LEFT SIDE: LOGO -->
            <div class="auth-left">
                <img src="../static/img/logo.png" alt="Mrs. Brave's Logo" class="auth-logo">
            </div>
            <!-- RIGHT SIDE: FORMS -->
            <div class="form-container">
                <!-- Login Form -->
                <form id="loginForm" class="form active">
                    <h2>Login</h2>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('loginPassword')"></i>
                    </div>
                    <button type="submit">Login</button>
                    <p style="text-align: center; margin-top: 10px;">
                        <a href="/forgot-password" class="toggle-btn">Forgot Password?</a>
                    </p>

                    <p class="toggle-msg">
                        Don't have an account? 
                        <span class="toggle-btn" onclick="toggleForms()">Sign Up Here</span>
                    </p>
                    
                    <p class="toggle-msg">
                    Or <span class="toggle-btn google-signin-btn"><i class="fab fa-google"></i> Sign in with Google</span>
                    </p>
                </form>

                <!-- Sign Up Form (with fname and correct field names) -->
                <form id="signupForm" class="form">
                    <h2>Sign Up</h2>
                    <input type="email" id="signupEmail" placeholder="Email" required maxlength="254">
                    <input type="text" id="signupFname" placeholder="Full Name" required maxlength="100">
                    <input type="text" id="signupUsername" placeholder="Username" required maxlength="50">
                    <input type="tel" id="signupNumber" placeholder="Phone Number" required maxlength="13" pattern="(\+63|0)[0-9]{9,10}">
                    <input type="text" id="signupAddress" placeholder="Address" required maxlength="255">

                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('signupPassword')"></i>
                    </div>

                    <div class="password-wrapper">
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('signupConfirmPassword')"></i>
                    </div>

                    <button type="submit">Sign Up</button>
                    <p class="toggle-msg">
                        Already have an account? 
                        <span class="toggle-btn" onclick="toggleForms()">Login Here</span>
                    </p>
                    <p class="toggle-msg">
                        Or <span class="toggle-btn google-signin-btn"><i class="fab fa-google"></i> Sign in with Google</span>
                    </p>
                </form>


            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="custom-footer">
    <div class="footer-container">

        <h2>Mrs. Brave's</h2>
        </div>

        <p><i class="fas fa-location-dot"></i> R Mapa Street, Mandurriao, Iloilo City</p>

            </a>
        </p>
        </div>

<script>

            -webkit-backdrop-filter: blur(8px) !important;
            box-shadow: 0 8px 32px rgba(199, 21, 133, 0.15) !important;
        }
 
        /* === Title === */
        .glass-title {

            border-radius: 12px !important;
            padding: 10px 28px !important;
            font-weight: 600 !important;
            color: #1a1a1a !important;
            transition: all 0.2s ease !important;
        }

        }

        }
 
        /* Error */
        .glass-popup.swal2-icon-error .swal2-icon {
            border-color: #C71585 !important;
            color: #C71585 !important;
        }
        .glass-popup.swal2-icon-error .swal2-icon [class^="swal2-x-mark-line"] {

        }
 
        /* Success */
        .glass-popup.swal2-icon-success .swal2-icon {
            border-color: #e75480 !important;
            color: #e75480 !important;
        }
        .glass-popup.swal2-icon-success .swal2-success-ring {
            border-color: rgba(231, 84, 128, 0.3) !important;
        }
        .glass-popup.swal2-icon-success [class^="swal2-success-line"] {
            background-color: #e75480 !important;
        }
 
        /* Info */
        .glass-popup.swal2-icon-info .swal2-icon {
            border-color: #C71585 !important;
            color: #C71585 !important;
        }
        .glass-popup.swal2-icon-info .swal2-icon-content {
            color: #C71585 !important;
        }
 
        /* Question */

})();
 
/* ============================================================
   SHARED SWAL HELPER
   Wraps Swal.fire() with the glass theme pre-applied.
   Usage: glassAlert({ icon, title, text, ...extraOptions })
   ============================================================ */
function glassAlert(options = {}) {
    return Swal.fire({
        background: 'rgba(255, 255, 255, 0.12)',
        color: '#1a1a1a',
        backdrop: 'rgba(0, 0, 0, 0.6)',
        customClass: {
            popup: 'glass-popup',
            title: 'glass-title',
            confirmButton: 'glass-confirm-btn',
            cancelButton: 'glass-cancel-btn',
        },
        buttonsStyling: false,
        ...options
    });
}

   ============================================================ */

const auth = firebase.auth();
 
/* ============================================================
   PASSWORD VALIDATION
   ============================================================ */
function validatePassword(password) {
    if (password.length < 8) {
        return 'Password must be at least 8 characters.';
    }
    if (!/[A-Z]/.test(password)) {
        return 'Password must contain at least one uppercase letter.';
    }
    if (!/[0-9]/.test(password)) {
        return 'Password must contain at least one number.';
    }
    if (!/[!@#$%^&*]/.test(password)) {
        return 'Password must contain at least one special character (!@#$%^&*).';
    }
    return null;
}
 
/* ============================================================
   RECAPTCHA
   ============================================================ */
async function getRecaptchaToken(action) {
    return new Promise((resolve) => {
        const timeout = setTimeout(() => resolve(null), 3000);
        grecaptcha.ready(async () => {
            clearTimeout(timeout);
            const token = await grecaptcha.execute(
                '{{ recaptcha_site_key }}',
                { action: action }
            );
            resolve(token);
        });
    });
}
 
/* ============================================================
   SEND TOKEN TO BACKEND
   ============================================================ */
async function sendTokenToBackend(user, action = 'login') {
    const idToken = await user.getIdToken(true);
    const recaptchaToken = await getRecaptchaToken(action);
    const response = await fetch('/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: idToken, recaptchaToken: recaptchaToken })
    });
 
    if (response.ok) {
        const data = await response.json();
        if (data.needs_verification) {
            await glassAlert({
                icon: 'warning',
                title: 'Email Not Verified',
                text: 'Please check your email (and spam folder) before logging in.',
                confirmButtonText: 'Got it'
            });
            await auth.signOut();
            return;
        }
        if (data.is_admin) {
            window.location.href = '/admin/dashboard';
        } else if (data.needs_profile) {
            window.location.href = '/complete-profile';
        } else {
            window.location.href = '/customer_dashboard';
        }
    } else {
        const error = await response.json();
        glassAlert({
            icon: 'error',
            title: 'Authentication Failed',
            text: error.error || 'Unknown error',
            confirmButtonText: 'OK'
        });
    }
}
 
/* ============================================================
   LOGIN
   ============================================================ */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
 
    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        await sendTokenToBackend(userCredential.user);
    } catch (error) {
        const messages = {
            'auth/invalid-login-credentials': 'Invalid email or password. Please try again.',
            'auth/user-not-found': 'No account found with this email.',
            'auth/wrong-password': 'Incorrect password. Please try again.',
            'auth/too-many-requests': 'Too many attempts. Please wait before trying again.',
            'auth/invalid-email': 'Please enter a valid email address.',
            'auth/user-disabled': 'This account has been disabled.'
        };
        glassAlert({
            icon: 'error',
            title: 'Login Failed',
            text: messages[error.code] || 'Login failed. Please try again.',
            confirmButtonText: 'OK'
        });
    }
});
 
/* ============================================================
   SIGNUP
   ============================================================ */
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('signupEmail').value;
    const fname = document.getElementById('signupFname').value;
    const username = document.getElementById('signupUsername').value;
    const number = document.getElementById('signupNumber').value;
    const address = document.getElementById('signupAddress').value;
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirmPassword').value;
 
    if (password !== confirm) {
        glassAlert({
            icon: 'error',
            title: 'Passwords Do Not Match',
            text: 'Please make sure both passwords are the same.',
            confirmButtonText: 'Try Again'
        });
        return;
    }
 
    const passwordError = validatePassword(password);
    if (passwordError) {
        glassAlert({
            icon: 'error',
            title: 'Weak Password',
            text: passwordError,
            confirmButtonText: 'OK'
        });
        return;
    }
 
    try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        await user.sendEmailVerification();
        const idToken = await user.getIdToken();
 
        const response = await fetch('/save-user-details', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + idToken
            },
            body: JSON.stringify({
                uid: user.uid,
                username: username,
                number: number,
                address: address,
                fname: fname
            })
        });
 
        if (response.ok) {
            await auth.signOut();
            await glassAlert({
                icon: 'success',
                title: 'Account Created!',
                text: 'Please verify your email before logging in.',
                confirmButtonText: 'Go to Login'
            });
            toggleForms();
        } else {
            glassAlert({
                icon: 'error',
                title: 'Save Failed',
                text: 'Failed to save profile data. Please try again.',
                confirmButtonText: 'OK'
            });
        }
    } catch (error) {
        const messages = {
            'auth/email-already-in-use': 'This email is already registered.',
            'auth/invalid-email': 'Please enter a valid email address.',
            'auth/weak-password': 'Password must be at least 6 characters.',
            'auth/operation-not-allowed': 'Sign-up is currently disabled.'
        };
        glassAlert({
            icon: 'error',
            title: 'Signup Failed',
            text: messages[error.code] || 'Signup failed. Please try again.',
            confirmButtonText: 'OK'
        });
    }
});
 
/* ============================================================
   FORGOT PASSWORD
   ============================================================ */
async function forgotPassword() {
    const email = document.getElementById('loginEmail').value;
 
    if (!email) {
        glassAlert({
            icon: 'warning',
            title: 'Email Required',
            text: 'Please enter your email address first.',
            confirmButtonText: 'OK'
        });
        return;
    }
 
    try {
        await auth.sendPasswordResetEmail(email);
        glassAlert({
            icon: 'success',
            title: 'Reset Email Sent',
            text: 'Check your inbox (and spam folder) for the reset link.',
            confirmButtonText: 'OK'
        });
    } catch (error) {
        const messages = {
            'auth/user-not-found': 'No account found with this email.',
            'auth/invalid-email': 'Please enter a valid email address.',
            'auth/too-many-requests': 'Too many requests. Please try again later.'
        };
        glassAlert({
            icon: 'error',
            title: 'Error',
            text: messages[error.code] || 'Unable to send reset email. Please try again.',
            confirmButtonText: 'OK'
        });
    }
}
 
/* ============================================================
   GOOGLE SIGN-IN
   ============================================================ */
document.querySelectorAll('.google-signin-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            await sendTokenToBackend(result.user);
        } catch (error) {
            const messages = {
                'auth/popup-closed-by-user': 'Sign-in cancelled.',
                'auth/popup-blocked': 'Popup blocked. Please allow popups for this site.',
                'auth/cancelled-popup-request': 'Sign-in cancelled.',
                'auth/account-exists-with-different-credential': 'This email is already registered with password login. Please sign in with your email and password instead.'
            };
            glassAlert({
                icon: 'error',
                title: 'Google Sign-In Failed',
                text: messages[error.code] || 'Google sign-in failed. Please try again.',
                confirmButtonText: 'OK'
            });
        }
    });
});
 
/* ============================================================
   UI HELPERS
   ============================================================ */
function toggleForms() {
    document.getElementById("loginForm").classList.toggle("active");
    document.getElementById("signupForm").classList.toggle("active");
}
 
function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = input.nextElementSibling;
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
 
/* ============================================================
   CSRF FETCH INTERCEPTOR
   ============================================================ */
const originalFetch = window.fetch;
window.fetch = function(url, options = {}) {
    const isOwnServer = typeof url === 'string' &&
        (!url.startsWith('http') || url.includes(window.location.hostname));
 
    if (isOwnServer) {
        options = options || {};
        options.headers = options.headers || {};
        options.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]')?.content || '';
    }
 
    return originalFetch(url, options);
};
</script>
