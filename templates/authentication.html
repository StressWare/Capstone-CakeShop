<!-- authentication.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link href="../static/css/authentication.css" rel="stylesheet">
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar fixed-top" style="min-height:80px; height:auto; overflow:visible; padding:10px; background-color:#f8f9fa;">
  <div class="container-fluid">
    <a href="#">
      <img src="/static/img/mrs.brave.jpg" 
           alt="MRS. Brave's" 
           style="height:60px; width:auto; object-fit:contain; display:block;">
    </a>
  </div>
</nav>

    <!-- Spacer for navbar -->
    <div style="height: 70px;"></div>

    <!-- FORM CONTAINER -->
    <div class="container">
        <div style="height: 70px;"></div>
        
        <div class="container auth-layout">
            <!-- LEFT SIDE: LOGO -->
            <div class="auth-left">
                <img src="../static/img/logo.png" alt="Mrs. Brave's Logo" class="auth-logo">
            </div>
            <!-- RIGHT SIDE: FORMS -->
            <div class="form-container">
                <!-- Login Form -->
                <form id="loginForm" class="form active">
                    <h2>Login</h2>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('loginPassword')"></i>
                    </div>
                    <button type="submit">Login</button>
                    <p style="text-align: center; margin-top: 10px;">
                        <a href="/forgot-password" class="toggle-btn">Forgot Password?</a>
                    </p>

                    <p class="toggle-msg">
                        Don't have an account? 
                        <span class="toggle-btn" onclick="toggleForms()">Sign Up Here</span>
                    </p>
                    
                    <p class="toggle-msg">
                    Or <span class="toggle-btn" id="googleSignIn"><i class="fab fa-google"></i> Sign in with Google</span>
                    </p>
                </form>

                <!-- Sign Up Form (with fname and correct field names) -->
                <form id="signupForm" class="form">
                    <h2>Sign Up</h2>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="text" id="signupFname" placeholder="Full Name" required>   <!-- NEW -->
                    <input type="text" id="signupUsername" placeholder="Username" required>
                    <input type="tel" id="signupNumber" placeholder="Phone Number" required> <!-- ID matches Flask 'number' -->
                    <input type="text" id="signupAddress" placeholder="Address" required>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('signupPassword')"></i>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                        <i class="fa-regular fa-eye toggle-eye" onclick="togglePassword('signupConfirmPassword')"></i>
                    </div>
                    <button type="submit">Sign Up</button>
                    <p class="toggle-msg">
                        Already have an account? 
                        <span class="toggle-btn" onclick="toggleForms()">Login Here</span>
                    </p>

                    <p class="toggle-msg">
                    Or <span class="toggle-btn" id="googleSignIn"><i class="fab fa-google"></i> Sign in with Google</span>
                    </p>
                </form>


            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="custom-footer">
    <div class="footer-container">
        <div class="footer-left">
        <h2>Mrs. Brave's</h2>
        </div>
        <div class="footer-right">
        <p><i class="fas fa-phone"></i> 0956 350 4486</p>
        <p><i class="fas fa-location-dot"></i> R Mapa Street, Mandurriao, Iloilo City</p>
        <p>
            <a href="https://www.facebook.com/mrsbraveonline" target="_blank">
            <i class="fab fa-facebook"></i>
            </a>
        </p>
        </div>
    </div>
    </footer>


<script>
    // Your Firebase configuration (from console)
    const firebaseConfig = {
        apiKey: "AIzaSyAKe10I1uuRRm67YpdUu7ZYgIVHnlbLdKY",
        authDomain: "cakeshop-2faf4.firebaseapp.com",
        projectId: "cakeshop-2faf4",
        storageBucket: "cakeshop-2faf4.firebasestorage.app",
        messagingSenderId: "470246706853",
        appId: "1:470246706853:web:339c4084715b0286b6474c",
        measurementId: "G-8PLLYZRD9Y"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Helper: send ID token to Flask backend
    async function sendTokenToBackend(user) {
    const idToken = await user.getIdToken(true);
    const response = await fetch('/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: idToken })
    });
    if (response.ok) {
        const data = await response.json();  // ← READ the response
        if (data.needs_verification) {
            Swal.fire({
                icon: 'warning',
                title: 'Email Not Verified',
                text: 'Please check your email (and spam folder) before logging in.',
                confirmButtonColor: '#C71585'
            })
            await auth.signOut()
            return
        }
        if (data.is_admin) {
            window.location.href = '/admin/dashboard';  // ← admin goes here
        } else if (data.needs_profile) {
            window.location.href = '/complete-profile';  // ← new google user
        } else {
            window.location.href = '/customer_dashboard';  // ← existing user
        }
    } else {
        const error = await response.json();
        Swal.fire({
            icon: 'error',
            title: 'Authentication Failed',
            text: error.error || 'Unknown error',
            confirmButtonColor: '#C71585'
        })
    }
}

    // ===== LOGIN =====
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            await sendTokenToBackend(userCredential.user);
        } catch (error) {
            const messages = {
                'auth/invalid-login-credentials': 'Invalid email or password. Please try again.',
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/too-many-requests': 'Too many attempts. Please wait before trying again.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/user-disabled': 'This account has been disabled.'
            };
            Swal.fire({
                icon: 'error',
                title: 'Login Failed',
                text: messages[error.code] || 'Login failed. Please try again.',
                confirmButtonColor: '#C71585',
                confirmButtonText: 'OK'
            });
        }
    });

    // ===== SIGNUP =====
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value;
        const fname = document.getElementById('signupFname').value;          
        const username = document.getElementById('signupUsername').value;
        const number = document.getElementById('signupNumber').value;        
        const address = document.getElementById('signupAddress').value;
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;

        if (password !== confirm) {
            Swal.fire({
                icon: 'error',
                title: 'Passwords Do Not Match',
                text: 'Please try again.',
                confirmButtonColor: '#C71585'
            });
            return;
        }

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;
            await user.sendEmailVerification()
            const idToken = await user.getIdToken();

            const response = await fetch('/save-user-details', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + idToken
                },
                body: JSON.stringify({
                    uid: user.uid,
                    username: username,
                    number: number,       
                    address: address,
                    fname: fname
                })
            });

            if (response.ok) {
                await auth.signOut();            // ← sign out first
                Swal.fire({
                    icon: 'success',
                    title: '✅ Account Created!',
                    text: 'Please check your email before logging in.',
                    confirmButtonColor: '#C71585'
                });
                toggleForms();                   // ← switch to login form
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Save Failed',
                    text: 'Failed to save profile data.',
                    confirmButtonColor: '#C71585'
                });
            }
        } catch (error) {
            const messages = {
                'auth/email-already-in-use': 'This email is already registered.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/weak-password': 'Password should be at least 6 characters.',
                'auth/operation-not-allowed': 'Sign-up is currently disabled.'
            };
            Swal.fire({
                icon: 'error',
                title: 'Signup Failed',
                text: error.code === 'auth/email-already-in-use' ? 'This email is already registered.' : 
                    error.code === 'auth/weak-password' ? 'Password must be at least 6 characters.' : 
                    'Signup failed. Please try again.',
                confirmButtonColor: '#C71585'
            });
        }
    });

    async function forgotPassword() {
    const email = document.getElementById('loginEmail').value;

    if (!email) {
        Swal.fire({
            icon: 'warning',
            title: 'Email Required',
            text: 'Please enter your email first.',
            confirmButtonColor: '#C71585'
        });
        return;
    }

    try {
        await auth.sendPasswordResetEmail(email);
        Swal.fire({
            icon: 'success',
            title: 'Reset Email Sent',
            text: 'Check your Gmail (and spam folder).',
            confirmButtonColor: '#C71585'
        })
    } catch (error) {
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: error.message,
            confirmButtonColor: '#C71585'
        });
    }
}

    // ===== GOOGLE SIGN-IN =====
    document.getElementById('googleSignIn').addEventListener('click', async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            await sendTokenToBackend(result.user);
        } catch (error) {
            const messages = {
                'auth/popup-closed-by-user': 'Sign-in cancelled.',
                'auth/popup-blocked': 'Popup blocked. Please allow popups for this site.',
                'auth/cancelled-popup-request': 'Sign-in cancelled.',
                'auth/account-exists-with-different-credential': 'An account already exists with this email.'
            };
            Swal.fire({
                icon: 'error',
                title: 'Google Sign-In Failed',
                text: error.code === 'auth/popup-closed-by-user' ? 'Sign-in cancelled.' : 
                    'Google sign-in failed. Please try again.',
                confirmButtonColor: '#C71585'
            });
        }
    });

    // ===== Toggle between login/signup forms =====
    function toggleForms() {
        document.getElementById("loginForm").classList.toggle("active");
        document.getElementById("signupForm").classList.toggle("active");
    }

    // ===== Toggle password visibility =====
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script>
</body>
</html>
