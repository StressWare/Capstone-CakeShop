<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customize Your Cake - MRS. Brave's Cake Iloilo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../static/css/customization.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-container">
    <a class="navbar-brand" href="/">
      <img src="../static/img/mrs.brave.jpg" alt="MRS. Brave's" class="navbar-logo">
    </a>
    <button class="menu-btn" id="menuToggle">☰ Menu</button>
  </div>
</nav>

<!-- OFFCANVAS -->
<div class="offcanvas" id="offcanvasMenu">
  <div class="offcanvas-header">
    <h5>Navigate</h5>
    <button class="close-btn" id="menuClose">&times;</button>
  </div>
  <div class="offcanvas-body">
    <a href="/">Home</a>
    <a href="/customer_dashboard">Profile</a>
    <a href="/cart">Cart</a>
    <a href="/cakes">Cake Showcase</a>
    <a href="/customize_cake">Customize Your Cake</a>
  </div>
</div>
<div style="margin-top: 50px;"></div>
<section class="customize-section">
  <form method="POST" action="/order" enctype="multipart/form-data">
    <h3>Step 1: Customize Your Cake</h3>
    <hr>

    <label for="cakeType">Cake Flavors</label>
    <select id="cakeType">
      <option value="800">Chocolate (₱800)</option>
      <option value="850">Vanilla (₱850)</option>
      <option value="900">Red Velvet (₱900)</option>
    </select>

    <label for="design">Icing Type</label>
    <select id="design">
      <option value="3500">Fondant (₱3,500)</option>
      <option value="1800">Icing (₱1,800-2,000)</option>
    </select>

    <label for="cakeSize">Cake Size</label>
    <select id="cakeSize">
      <option value="1600">6 inches (₱1,600)</option>
      <option value="2300">8 inches (₱2,300)</option>
      <option value="400">10 inches (₱400)</option>
      <option value="600">12 inches (₱600)</option>
    </select>

    <label for="layers">Layers</label>
    <select id="layers">
      <option value="0">Single Layer (₱0)</option>
      <option value="300">Double Layer (+₱300)</option>
      <option value="600">Triple Layer (+₱600)</option>
    </select>

    <label for="toppers">Toppers</label>
    <select id="toppers">
      <option value="150">1 set (₱150)</option>
      <option value="250">Set of 3 (₱250)</option>
    </select>

    <label>Add-ons</label>
    <div>
      <input type="checkbox" class="addons" value="100" id="filling">
      <label for="filling">Cake Filling (₱100)</label>
    </div>
    <div>
      <input type="checkbox" class="addons" value="700" id="cupcake">
      <label for="cupcake">Cupcake (dozen) (₱700)</label>
    </div>
    <div>
      <input type="checkbox" class="addons" value="250" id="ediblepaper">
      <label for="ediblepaper">Edible Paper (₱250)</label>
    </div>
    <div>
      <input type="checkbox" class="addons" value="450" id="fondanttoppers">
      <label for="fondanttoppers">Fondant Toppers (per character) (₱450)</label>
    </div>

    <label for="notes">Special Instructions</label>
    <textarea name="notes" id="notes" rows="2" placeholder="e.g., Allergy warning, no nuts..."></textarea>

    <label for="image" class="custom-file-btn">
     <i class="bi bi-upload"></i> Upload Cake Image
    </label>
    <input type="file" name="image" id="image" accept="image/*" onchange="checkFileSize(this)" hidden>
    <small>Upload an image of your desired cake (optional) — Max 2MB</small>

    <label>
      <input type="checkbox" name="rush" value="yes"> Rush Order
    </label>

    <div class="price-box">
      Total: ₱<span id="totalPrice">0</span>
    </div>

    <!-- Hidden fields populated by JS before submit -->
    <input type="hidden" name="order_item" id="orderItem">
    <input type="hidden" name="amount"     id="orderAmount">

    {% if customer %}
      <button type="submit" onclick="updateOrderData()">Proceed to Checkout</button>
    {% else %}
      <a href="/authentication" class="btn">Login to Order</a>
    {% endif %}

  </form>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const menuBtn  = document.getElementById("menuToggle");
const offcanvas = document.getElementById("offcanvasMenu");
const menuClose = document.getElementById("menuClose");

menuBtn.addEventListener("click",  () => offcanvas.classList.add("active"));
menuClose.addEventListener("click", () => offcanvas.classList.remove("active"));
document.addEventListener("click",  (e) => {
  if (!offcanvas.contains(e.target) && !menuBtn.contains(e.target)) {
    offcanvas.classList.remove("active");
  }
});

function calculateTotal() {
  const cakePrice    = parseFloat(document.getElementById("cakeType").value) || 0;
  const designPrice  = parseFloat(document.getElementById("design").value)   || 0;
  const sizePrice    = parseFloat(document.getElementById("cakeSize").value)  || 0;
  const layersPrice  = parseFloat(document.getElementById("layers").value)    || 0;
  const toppersPrice = parseFloat(document.getElementById("toppers").value)   || 0;

  let addonsTotal = 0;
  document.querySelectorAll(".addons:checked").forEach(a => {
    addonsTotal += parseFloat(a.value) || 0;
  });

  const total = cakePrice + designPrice + sizePrice + layersPrice + toppersPrice + addonsTotal;
  document.getElementById("totalPrice").innerText = total.toFixed(2);
  return total;
}

function updateOrderData() {
  const total = calculateTotal();
  document.getElementById("orderAmount").value = total.toFixed(2);

  const cake    = document.getElementById("cakeType").selectedOptions[0].text;
  const design  = document.getElementById("design").selectedOptions[0].text;
  const size    = document.getElementById("cakeSize").selectedOptions[0].text;
  const layers  = document.getElementById("layers").selectedOptions[0].text;
  const toppers = document.getElementById("toppers").selectedOptions[0].text;

  let addons = [];
  document.querySelectorAll(".addons:checked").forEach(a => {
    addons.push(a.nextElementSibling.innerText.trim());
  });

  let description = `${cake}, ${size}, ${layers}, ${design}, Toppers: ${toppers}`;
  if (addons.length > 0) {
    description += `, Add-ons: ${addons.join(", ")}`;
  }

  document.getElementById("orderItem").value = description;
}

document.getElementById("cakeType").addEventListener("change", calculateTotal);
document.getElementById("design").addEventListener("change",   calculateTotal);
document.getElementById("cakeSize").addEventListener("change", calculateTotal);
document.getElementById("layers").addEventListener("change",   calculateTotal);
document.getElementById("toppers").addEventListener("change",  calculateTotal);
document.querySelectorAll(".addons").forEach(a => a.addEventListener("change", calculateTotal));

calculateTotal();

function checkFileSize(input) {
    if (input.files[0] && input.files[0].size > 2 * 1024 * 1024) {
        alert('File too large! Maximum size is 2MB.');
        input.value = '';  // clear the input
    }
}
</script>

</body>
</html>
