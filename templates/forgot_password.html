<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password</title>
  <link href="../static/css/authentication.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../static/img/logo.png">    
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top" style="min-height:80px; height:auto; overflow:visible; padding:10px; background-color:#000000;">
  <div class="container-fluid">
    <a href="#">
      <img src="/static/img/mrs.brave.jpg" 
           alt="MRS. Brave's" 
           style="height:160px; width:auto; object-fit:contain; display:block; margin-top: 18px;">
    </a>
  </div>
</nav>

<div style="height: 70px;"></div>

<div class="container">
  <div style="height: 70px;"></div>

  <div class="container auth-layout">
    <!-- LEFT SIDE: LOGO -->
    <div class="auth-left">
      <img src="../static/img/logo.png" alt="Mrs. Brave's Logo" class="auth-logo">
    </div>

    <!-- RIGHT SIDE: FORM -->
    <div class="form-container">
      <form id="forgotForm" class="form active">
        <h2>Forgot Password</h2>
        <p style="color: gray; margin-bottom: 20px; text-align: center;">
          Enter your email and we'll send you a reset link.
        </p>

        <input 
          type="email" 
          id="resetEmail" 
          placeholder="Enter your email" 
          required
        >

        <button type="submit" id="submitBtn">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Link
        </button>

        <p class="toggle-msg" style="text-align: center; margin-top: 15px;">
          Remember your password?
          <a href="/authentication" class="toggle-btn">Login Here</a>
        </p>
      </form>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="custom-footer">
  <div class="footer-container">
    <div class="footer-left">
      <h2>Mrs. Brave's</h2>
    </div>
    <div class="footer-right">
      <p><i class="fas fa-phone"></i> 0956 350 4486</p>
      <p><i class="fas fa-location-dot"></i> R Mapa Street, Mandurriao, Iloilo City</p>
      <p>
        <a href="https://www.facebook.com/mrsbraveonline" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-facebook"></i>
        </a>
      </p>

<script>
(function injectGlassStyles() {
    const style = document.createElement('style');
    style.textContent = `
        .glass-popup {
            background: rgba(255,255,255, 0.82) !important;
            border: 1px solid rgba(255, 192, 203, 0.45) !important;
            border-radius: 20px !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            box-shadow: 0 8px 32px rgba(199, 21, 133, 0.15) !important;
        }
        .glass-title {
            color: #1a1a1a !important;
            font-weight: 700 !important;
            font-size: 1.4rem !important;
        }
        .glass-popup .swal2-title::after,
        .glass-popup .swal2-title::before { display: none !important; }
        .glass-popup .swal2-header { border-bottom: none !important; }
        .glass-popup .swal2-html-container {
            color: #2a2a2a !important;
            font-size: 0.95rem !important;
        }
        .glass-confirm-btn {
            background: linear-gradient(135deg, #e75480, #C71585) !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 10px 28px !important;
            font-weight: 600 !important;
            letter-spacing: 0.4px !important;
            box-shadow: 0 4px 15px rgba(199, 21, 133, 0.35) !important;
            transition: all 0.2s ease !important;
            color: #fff !important;
        }
        .glass-confirm-btn:hover {
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 20px rgba(199, 21, 133, 0.5) !important;
        }
        .glass-popup.swal2-icon-warning .swal2-icon { border-color: #e75480 !important; color: #e75480 !important; }
        .glass-popup.swal2-icon-error .swal2-icon { border-color: #C71585 !important; color: #C71585 !important; }
        .glass-popup.swal2-icon-error .swal2-icon [class^="swal2-x-mark-line"] { background-color: #C71585 !important; }
        .glass-popup.swal2-icon-success .swal2-icon { border-color: #e75480 !important; color: #e75480 !important; }
        .glass-popup.swal2-icon-success .swal2-success-ring { border-color: rgba(231, 84, 128, 0.3) !important; }
        .glass-popup.swal2-icon-success [class^="swal2-success-line"] { background-color: #e75480 !important; }
    `;
    document.head.appendChild(style);
})();

function glassAlert(options = {}) {
    return Swal.fire({
        background: 'rgba(255, 255, 255, 0.12)',
        color: '#1a1a1a',
        backdrop: 'rgba(0, 0, 0, 0.6)',
        customClass: {
            popup: 'glass-popup',
            title: 'glass-title',
            confirmButton: 'glass-confirm-btn',
        },
        buttonsStyling: false,
        ...options
    });
}

const firebaseConfig = {
    apiKey: "AIzaSyAKe10I1uuRRm67YpdUu7ZYgIVHnlbLdKY",
    authDomain: "cakeshop-2faf4.firebaseapp.com",
    projectId: "cakeshop-2faf4",
    storageBucket: "cakeshop-2faf4.firebasestorage.app",
    messagingSenderId: "470246706853",
    appId: "1:470246706853:web:339c4084715b0286b6474c",
    measurementId: "G-8PLLYZRD9Y"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('resetEmail').value.trim();
    const submitBtn = document.getElementById('submitBtn');

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';

    try {
        await auth.sendPasswordResetEmail(email);

        await glassAlert({
            icon: 'success',
            title: 'Reset Email Sent!',
            text: 'Check your inbox (and spam folder) for the reset link.',
            confirmButtonText: 'Back to Login'
        });

        window.location.href = '/authentication';

    } catch (error) {
        const messages = {
            'auth/user-not-found': 'No account found with this email.',
            'auth/invalid-email': 'Please enter a valid email address.',
            'auth/too-many-requests': 'Too many requests. Please try again later.'
        };

        glassAlert({
            icon: 'error',
            title: 'Error',
            text: messages[error.code] || 'Unable to send reset email. Please try again.',
            confirmButtonText: 'OK'
        });

        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send Reset Link';
    }
});

const originalFetch = window.fetch;
window.fetch = function(url, options = {}) {
    const isOwnServer = typeof url === 'string' &&
        (!url.startsWith('http') || url.includes(window.location.hostname));
    if (isOwnServer) {
        options = options || {};
        options.headers = options.headers || {};
        options.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]')?.content || '';
    }
    return originalFetch(url, options);
};
</script>
</body>
</html>
