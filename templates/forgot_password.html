<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="../static/css/authentication.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../static/img/logo.png">    
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="../static/img/mrs.brave.jpg" alt="MRS. Brave's" class="navbar-logo">
    </a>
  </div>
</nav>

<div style="height: 70px;"></div>

<div class="container">
  <div style="height: 70px;"></div>

  <div class="container auth-layout">
    <!-- LEFT SIDE: LOGO -->
    <div class="auth-left">
      <img src="../static/img/logo.png" alt="Mrs. Brave's Logo" class="auth-logo">
    </div>

    <!-- RIGHT SIDE: FORM -->
    <div class="form-container">
      <form id="forgotForm" class="form active">
        <h2>Forgot Password</h2>
        <p style="color: gray; margin-bottom: 20px; text-align: center;">
          Enter your email and we'll send you a reset link.
        </p>

        <!-- Success Message (hidden by default) -->
        <div id="successMsg" style="
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        ">
          <i class="fas fa-check-circle me-2"></i>
          Reset email sent! Check your Gmail.
        </div>

        <!-- Error Message (hidden by default) -->
        <div id="errorMsg" style="
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        ">
          <i class="fas fa-exclamation-circle me-2"></i>
          <span id="errorText"></span>
        </div>

        <input 
          type="email" 
          id="resetEmail" 
          placeholder="Enter your email" 
          required
        >

        <button type="submit" id="submitBtn">
          <i class="fas fa-paper-plane me-2"></i>Send Reset Link
        </button>

        <p class="toggle-msg" style="text-align: center; margin-top: 15px;">
          Remember your password?
          <a href="/authentication" class="toggle-btn">Login Here</a>
        </p>
      </form>
    </div>
  </div>
</div>
<script>
  const firebaseConfig = {
      apiKey: "AIzaSyAKe10I1uuRRm67YpdUu7ZYgIVHnlbLdKY",
      authDomain: "cakeshop-2faf4.firebaseapp.com",
      projectId: "cakeshop-2faf4",
      storageBucket: "cakeshop-2faf4.firebasestorage.app",
      messagingSenderId: "470246706853",
      appId: "1:470246706853:web:339c4084715b0286b6474c",
      measurementId: "G-8PLLYZRD9Y"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('resetEmail').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    // Hide previous messages
    successMsg.style.display = 'none';
    errorMsg.style.display = 'none';

    // Disable button while processing
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';

    try {
      await auth.sendPasswordResetEmail(email);

      // Show success
      successMsg.style.display = 'block';

      // Disable form after success
      document.getElementById('resetEmail').disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-check me-2"></i>Email Sent!';

    } catch (error) {
      // Show error
      errorMsg.style.display = 'block';

      // Friendly error messages
      if (error.code === 'auth/user-not-found') {
        errorText.textContent = 'No account found with this email.';
      } else if (error.code === 'auth/invalid-email') {
        errorText.textContent = 'Please enter a valid email address.';
      } else {
        errorText.textContent = error.message;
      }

      // Re-enable button
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send Reset Link';
    }
  });
</script>
</body>
</html>
